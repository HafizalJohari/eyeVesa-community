server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    data_dir = "/opt/spire/data"
    trust_domain = "agentid.dev"

    plugins {
        DataStore "sql" {
            plugin_data {
                driver_type = "postgres"
                connection_string = "host=postgres port=5432 user=agentid password=agentid_dev dbname=agentid sslmode=disable"
            }
        }

        KeyManager "memory" {
            plugin_data {}
        }

        NodeAttestor "x509pop" {
            plugin_data {}
        }

        NodeResolver "noop" {
            plugin_data {}
        }
    }
}