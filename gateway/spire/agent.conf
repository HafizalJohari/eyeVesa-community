agent {
    data_dir = "/opt/spire/data"
    server_address = "spire-server"
    server_port = "8081"
    trust_domain = "agentid.dev"

    plugins {
        KeyManager "memory" {
            plugin_data {}
        }

        WorkloadAttestor "unix" {
            plugin_data {}
        }

        WorkloadAttestor "k8s" {
            plugin_data {}
        }
    }
}