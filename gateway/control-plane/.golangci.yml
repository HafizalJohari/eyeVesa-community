run:
  timeout: 5m
  issues:
    exclude-dirs:
      - proto
      - registry

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt
    - goimports
    - gocritic
    - revive
    - copyloopvar
    - bodyclose
    - contextcheck
    - nilerr
    - prealloc
    - reassign

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: unused-parameter
      - name: unreachable-code
      - name: context-as-argument
      - name: error-strings
  gocritic:
    enabled-checks:
      - dupImport
      - truncateCmp
      - unnamedResult
      - sloppyReassign
      - rangeValCopy
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - govet
        - revive
    - path: cmd/api/handlers/
      linters:
        - errcheck