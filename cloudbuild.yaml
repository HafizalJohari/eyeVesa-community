steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eyevesa:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eyevesa:latest'
      - '-f'
      - 'gateway/core/Dockerfile'
      - '.'
    timeout: '1200s'

images:
  - 'gcr.io/$PROJECT_ID/eyevesa:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/eyevesa:latest'