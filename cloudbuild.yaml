# eyeVesa Cloud Build — Build and push all Docker images to Artifact Registry
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=asia-southeast1,_REPO=eyevesa,_TAG=latest \
#     --project=YOUR_PROJECT_ID
#
# Prerequisites:
#   1. Artifact Registry repo created:
#      gcloud artifacts repositories create eyevesa --repository-format=Docker \
#        --location=asia-southeast1 --project=YOUR_PROJECT_ID
#   2. Enable Cloud Build API:
#      gcloud services enable cloudbuild.googleapis.com

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gateway-control:${_TAG}'
      - '-f'
      - 'gateway/control-plane/Dockerfile'
      - '.'
    timeout: '500s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gateway-core:${_TAG}'
      - '-f'
      - 'gateway/core/Dockerfile'
      - '.'
    timeout: '500s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/resource-adapter:${_TAG}'
      - '-f'
      - 'adapter/resource-adapter-go/Dockerfile'
      - '.'
    timeout: '500s'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gateway-control:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gateway-core:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/resource-adapter:${_TAG}'

substitutions:
  _REGION: asia-southeast1
  _REPO: eyevesa
  _TAG: latest

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY