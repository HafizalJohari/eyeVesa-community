apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eyevesa.fullname" . }}-gateway-core
  labels:
    app.kubernetes.io/name: gateway-core
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-core
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-core
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: gateway-core
          image: "{{ .Values.image.gatewayCore.repository }}:{{ .Values.image.gatewayCore.tag }}"
          imagePullPolicy: {{ .Values.image.gatewayCore.pullPolicy }}
          ports:
            - containerPort: 9443
              name: https
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret }}
                  key: url
            - name: RUST_LOG
              value: "info"
            - name: GATEWAY_MODE
              value: "plaintext"
          resources:
            {{- toYaml .Values.resources.gatewayCore | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eyevesa.fullname" . }}-control-plane
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: control-plane
          image: "{{ .Values.image.controlPlane.repository }}:{{ .Values.image.controlPlane.tag }}"
          imagePullPolicy: {{ .Values.image.controlPlane.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret }}
                  key: url
            - name: OPA_ENDPOINT
              value: {{ .Values.opa.endpoint }}
            - name: EYEVESA_LLM_PROVIDER
              value: {{ .Values.llm.provider }}
            - name: EYEVESA_LLM_MODEL
              value: {{ .Values.llm.model }}
            - name: EYEVESA_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.apiKeySecret }}
                  key: {{ .Values.llm.apiKeyKey }}
                  optional: true
            - name: EYEVESA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.jwtSecret }}
                  key: {{ .Values.auth.jwtSecretKey }}
            {{- if .Values.notifications.slack.enabled }}
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.notifications.slack.webhookUrlSecret }}
                  key: {{ .Values.notifications.slack.webhookUrlKey }}
            {{- end }}
            {{- if .Values.notifications.pagerduty.enabled }}
            - name: PAGERDUTY_INTEGRATION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.notifications.pagerduty.integrationKeySecret }}
                  key: {{ .Values.notifications.pagerduty.integrationKeyKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources.controlPlane | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10