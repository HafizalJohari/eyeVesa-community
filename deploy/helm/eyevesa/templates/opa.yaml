apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eyevesa.fullname" . }}-opa
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opa
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:0.68.0
          args:
            - "run"
            - "--server"
            - "--addr"
            - ":8181"
            - "/policies"
          ports:
            - containerPort: 8181
          volumeMounts:
            - name: policies
              mountPath: /policies
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: policies
          configMap:
            name: {{ include "eyevesa.fullname" . }}-policies
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eyevesa.fullname" . }}-opa
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8181
      targetPort: 8181
      protocol: TCP
  selector:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: {{ .Release.Name }}