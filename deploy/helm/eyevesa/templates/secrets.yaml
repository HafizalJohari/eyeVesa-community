apiVersion: v1
kind: Secret
metadata:
  name: eyevesa-db-password
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ randAlphaNum 32 | quote }}
  url: "postgres://{{ .Values.database.user }}:{{ randAlphaNum 32 }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: eyevesa-jwt-secret
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  secret: {{ randAlphaNum 64 | quote }}