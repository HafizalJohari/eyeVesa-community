name: Security Phase 1

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go-vulnerability-scan:
    name: Go Vulnerability Scan (High/Critical Gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan control plane
        run: govulncheck ./...
        working-directory: gateway/control-plane
      - name: Scan resource adapter
        run: govulncheck ./...
        working-directory: adapter/resource-adapter-go

  iac-and-config-scan:
    name: IaC and Config Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  auth-policy-regression:
    name: Auth and Policy Regression Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway/control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Auth boundary regression tests
        run: go test ./internal/auth -count=1
      - name: Policy engine regression tests
        run: go test ./internal/policy -count=1
      - name: API handler authorization regression tests
        run: go test ./cmd/api/handlers -count=1
