<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <style>
    @keyframes dashFlowUp {
      to { stroke-dashoffset: -28; }
    }
    @keyframes dashFlowDown {
      to { stroke-dashoffset: 28; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes circlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.14); }
    }
    @keyframes hexDraw {
      0% { stroke-dashoffset: 1080; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes hexGlow {
      0%, 100% { stroke: #1E293B; }
      50% { stroke: #2D3B55; }
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes eyeOpen {
      0% { stroke-dashoffset: 300; opacity: 0; }
      40% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }
    .hex-border {
      stroke-dasharray: 1080;
      stroke-dashoffset: 1080;
      animation: hexDraw 2s ease-out forwards, hexGlow 4s ease-in-out 2s infinite;
    }
    .arc-up {
      stroke-dasharray: 8 6;
      animation: dashFlowUp 1s linear infinite, fadeInUp 1.5s ease-out forwards;
      opacity: 0;
    }
    .arc-down {
      stroke-dasharray: 6 4;
      animation: dashFlowDown 1s linear infinite, fadeInUp 1.5s 0.3s ease-out forwards;
      opacity: 0;
    }
    .eye-top {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: eyeOpen 1.2s 0.8s ease-out forwards;
      opacity: 0;
    }
    .eye-bottom {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: eyeOpen 1.2s 1s ease-out forwards;
      opacity: 0;
    }
    .center-pulse {
      transform-origin: 0 0;
      transform-box: fill-box;
      animation: circlePulse 3s ease-in-out 1.5s infinite;
    }
    .line-up {
      stroke-dasharray: 4 4;
      animation: dashFlowUp 0.8s linear infinite, pulse 2s ease-in-out 1.5s infinite;
      opacity: 0;
    }
    .line-down {
      stroke-dasharray: 4 4;
      animation: dashFlowDown 0.8s linear infinite, pulse 2s ease-in-out 1.5s infinite;
      opacity: 0;
    }
    .text-main {
      opacity: 0;
      animation: fadeInUp 1s 1.8s ease-out forwards;
    }
    .text-sub {
      opacity: 0;
      animation: fadeInUp 1s 2.2s ease-out forwards;
    }
  </style>

  
  <g transform="translate(400, 360)">
    <path d="M 0 -180 L 150 -90 L 150 90 L 0 180 L -150 90 L -150 -90 Z" 
          fill="none" 
          stroke="#1E293B" 
          stroke-width="8" 
          stroke-linejoin="round"
          class="hex-border" />
          
    <path d="M -120 -70 A 140 140 0 0 1 120 -70" 
          fill="none" 
          stroke="#0EA5E9" 
          stroke-width="4"
          class="arc-up" />
          
    <path d="M 120 70 A 140 140 0 0 1 -120 70" 
          fill="none" 
          stroke="#10B981" 
          stroke-width="4"
          class="arc-down" />

    <path d="M -95 0 C -45 -65, 45 -65, 95 0" 
          fill="none" 
          stroke="#F8FAFC" 
          stroke-width="8" 
          stroke-linecap="round"
          class="eye-top" />
          
    <path d="M -95 0 C -45 65, 45 65, 95 0" 
          fill="none" 
          stroke="#F8FAFC" 
          stroke-width="8" 
          stroke-linecap="round"
          class="eye-bottom" />
          
    <g class="center-pulse">
      <circle cx="0" cy="0" r="28" fill="#0EA5E9" />
      <circle cx="0" cy="0" r="12" fill="#1a1a2e" />
    </g>
    
    <line x1="0" y1="-55" x2="0" y2="-120" stroke="#0EA5E9" stroke-width="4" class="line-up" />
    <line x1="0" y1="55" x2="0" y2="120" stroke="#10B981" stroke-width="4" class="line-down" />
  </g>
  
  <text x="400" y="620" 
        text-anchor="middle" 
        fill="#F8FAFC" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="52" 
        font-weight="800" 
        letter-spacing="8"
        class="text-main">eyeVesa</text>
        
  <text x="400" y="665" 
        text-anchor="middle" 
        fill="#64748B" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" 
        font-weight="600" 
        letter-spacing="5"
        class="text-sub">IDENTITY &#183; TRUST &#183; AUDIT</text>
</svg>